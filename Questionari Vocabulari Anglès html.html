<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Quiz Viatger ✈️</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #2c3e50, #4ca1af);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .quiz-container {
    background: rgba(30,30,30,0.95);
    padding: 30px 50px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    text-align: center;
    width: 450px;
    color: #fff;
  }
  h1 {
    color: #1abc9c;
  }
  .question-box {
    font-size: 24px;
    font-weight: bold;
    margin: 20px 0;
    padding: 20px;
    background: #34495e;
    border-radius: 15px;
    border: 2px solid #1abc9c;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
  }
  .options button {
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    background-color: #16a085;
    color: #fff;
    font-weight: bold;
  }
  .options button:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }
  .result {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
  }
  .correct { background-color: #27ae60 !important; }
  .wrong { background-color: #c0392b !important; }
</style>
</head>
<body>

<div class="quiz-container" id="quizContainer">
  <h1>Quiz Viatger ✈️</h1>
  <div class="question-box" id="question"></div>
  <div class="options" id="options"></div>
  <div class="result" id="result"></div>
</div>

<script>
const quizData = [
  { word: "Passport", correct: "Passaport", choices: ["Maleta","Passaport","Duana"] },
  { word: "Suitcase", correct: "Maleta", choices: ["Maleta","Equipatge","Allotjament"] },
  { word: "Luggage", correct: "Equipatge", choices: ["Tripulació","Equipatge","Escala"] },
  { word: "Customs", correct: "Duana", choices: ["Duana","Retard","Embarcament"] },
  { word: "Layover", correct: "Escala", choices: ["Escala","Sobre-reserva","Passaport"] },
  { word: "Travel Insurance", correct: "Assegurança de viatge", choices: ["Enlairament","Assegurança de viatge","Disponibilitat"] },
  { word: "Guided Tour", correct: "Visita guiada", choices: ["Visita guiada","Tripulació","Maleta"] },
  { word: "Boarding", correct: "Embarcament", choices: ["Embarcament","Retard","Allotjament"] },
  { word: "Accommodation", correct: "Allotjament", choices: ["Allotjament","Duana","Equipatge"] },
  { word: "Overbooking", correct: "Sobre-reserva", choices: ["Escala","Sobre-reserva","Passaport"] }
];

let currentIndex = 0;
let score = 0;

// Mensajes divertidos y variados al acertar
const mensajesAcierto = [
  "¡Molt bé, payo! 💪",
  "¡Ets un crack, tio! 😎",
  "✅ Correcte, nano!",
  "¡Eso es, rey! 💥",
  "Bien jugado, campeon 😎",
  "¡Tremendo! Has acertado 🏆",
  "¡Pum! Otro acierto 💣",
  "¡Imparable, nano! 🚀",
  "¡Sigue así, crack! 💯",
  "¡Perfecto, rey! 👑"
];

// Mensajes divertidos al fallar
const mensajesFallo = [
  "Mala tuya, rei 😎",
  "Ups… t’ha fallat 😢",
  "Fallat, tio… 😏",
  "No ha sigut, nano… 💥",
  "Això no és, crack 😬",
  "Mala sort, payo 😎",
  "Oops… errat! 😅",
  "No pasa res, intenta-ho de nou 💪",
  "Reintenta, nano! 🔥",
  "No t’amoïnis, torna-ho a provar 😎"
];

function randomMsg(array){
  return array[Math.floor(Math.random()*array.length)];
}

function showQuestion() {
  if(currentIndex < quizData.length){
    const q = quizData[currentIndex];
    document.getElementById("question").textContent = `Quina és la traducció de: ${q.word}?`;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    const shuffled = q.choices.sort(() => Math.random() - 0.5);

    shuffled.forEach(choice => {
      const btn = document.createElement("button");
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(btn, choice);
      optionsDiv.appendChild(btn);
    });

    document.getElementById("result").textContent = "";
  } else {
    document.getElementById("quizContainer").innerHTML = `<h1>🏆 Has acabat el joc!</h1>
      <p style="font-size:22px;">Has encertat ${score} de ${quizData.length} preguntes! 💪</p>`;
  }
}

function checkAnswer(button, choice) {
  const correct = quizData[currentIndex].correct;
  if(choice === correct){
    button.classList.add("correct");
    document.getElementById("result").textContent = randomMsg(mensajesAcierto);
    score++;
  } else {
    button.classList.add("wrong");
    document.getElementById("result").textContent = randomMsg(mensajesFallo) + " La resposta correcta és: " + correct;
    // Resaltar la correcta
    const buttons = document.querySelectorAll(".options button");
    buttons.forEach(b => {
      if(b.textContent === correct) b.classList.add("correct");
    });
  }

  // Desactivar todos los botones
  const buttons = document.querySelectorAll(".options button");
  buttons.forEach(b => b.disabled = true);

  currentIndex++;
  setTimeout(showQuestion, 2000);
}

// Iniciar quiz
showQuestion();
</script>

</body>
</html>
